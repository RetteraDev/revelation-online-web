services:
  caddy:
    # image: retteradev/revelation-online-web-client:latest
    build:
      context: ./client
      dockerfile: ./Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/CaddyfileProd:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
