services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: revelation-online-web-client
    hostname: client
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
    environment:
      - CHOKIDAR_USEPOLLING=true
