services:
  caddy:
    image: caddy:2
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/CaddyfileDev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: revelation-online-web-client
    hostname: client
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
    environment:
      - CHOKIDAR_USEPOLLING=true
      - SERVER_HOST=${SERVER_HOST}

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: revelation-online-web-server
    hostname: server
    volumes:
      - ./server/src:/app/src
    environment:
      - SESSION_MIDDLEWARE=${SESSION_MIDDLEWARE}

      - OAUTH_VK_CLIENT_ID=${OAUTH_VK_CLIENT_ID}
      - OAUTH_VK_CLIENT_SECRET=${OAUTH_VK_CLIENT_SECRET}
      - OAUTH_VK_CLIENT_SECRET_SERVICE=${OAUTH_VK_CLIENT_SECRET_SERVICE}
      - OAUTH_VK_CLIENT_REDIRECT_URI=${OAUTH_VK_CLIENT_REDIRECT_URI}

      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  postgres:
    container_name: postgres-dev
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - revelation_online_web_postgres_data:/var/lib/postgresql/data
      # - ./server/seoboost/db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  revelation_online_web_postgres_data:
  caddy_data:
  caddy_config:
